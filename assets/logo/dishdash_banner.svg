<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DishDash">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1000" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF6B35"/>
      <stop offset="1" stop-color="#F7931E"/>
    </linearGradient>
  </defs>

  <!-- Banner background -->
  <rect x="0" y="0" width="1000" height="260" rx="40" fill="url(#brand)"/>

  <!-- Decorative circles -->
  <circle cx="880" cy="60" r="120" fill="#ffffff" opacity="0.08"/>
  <circle cx="960" cy="220" r="80" fill="#ffffff" opacity="0.08"/>

  <!-- Badge -->
  <circle cx="150" cy="130" r="82" fill="#ffffff"/>

  <!-- Fork -->
  <g fill="#FF6B35">
    <rect x="116" y="74" width="6" height="26" rx="3"/>
    <rect x="127" y="74" width="6" height="26" rx="3"/>
    <rect x="138" y="74" width="6" height="26" rx="3"/>
    <rect x="118" y="96" width="24" height="10" rx="5"/>
    <rect x="126" y="104" width="8" height="70" rx="4"/>
  </g>
  <!-- Spoon -->
  <g fill="#FF6B35">
    <ellipse cx="180" cy="92" rx="15" ry="20"/>
    <rect x="176" y="106" width="8" height="68" rx="4"/>
  </g>

  <!-- Wordmark -->
  <text x="286" y="128" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="80" font-weight="800" fill="#ffffff" letter-spacing="1">DishDash</text>
  <text x="290" y="176" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#ffffff" opacity="0.92">Discover the tastiest food deals near you</text>

  <!-- Tech pill -->
  <g>
    <rect x="290" y="196" width="300" height="34" rx="17" fill="#ffffff" opacity="0.18"/>
    <text x="308" y="219" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Flutter · Firebase · OpenStreetMap</text>
  </g>
</svg>
